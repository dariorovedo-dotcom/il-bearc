<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1e3a2f">
<title>Assistente — Il Bearč</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  :root {
    --forest: #1e3a2f;
    --moss: #3d6b4f;
    --sage: #7aaa8a;
    --cream: #f5f0e8;
    --warm: #e8dfc8;
    --stone: #8a7e6e;
    --bark: #5c4a35;
    --snow: #fafaf8;
    --accent: #c8a96e;
    --accent-light: rgba(200,169,110,0.15);
    --shadow: rgba(30,58,47,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    overflow: hidden;
  }

  body {
    font-family: 'Jost', sans-serif;
    background: var(--snow);
    color: var(--forest);
    display: flex;
    align-items: stretch;
    justify-content: center;
  }

  /* ── CHAT WRAPPER ─────────────────────────── */
  .chat-wrapper {
    width: 100%;
    max-width: 430px;
    display: flex;
    flex-direction: column;
    height: 100%;
    background: var(--snow);
    overflow: hidden;
  }

  /* ── HEADER ───────────────────────────────── */
  .chat-header {
    background: var(--forest);
    padding: 1.1rem 1.4rem;
    display: flex;
    align-items: center;
    gap: 0.9rem;
    flex-shrink: 0;
  }

  .chat-avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: var(--accent-light);
    border: 2px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3rem;
    flex-shrink: 0;
  }

  .chat-header-info h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    color: white;
    font-weight: 600;
  }

  .chat-header-info span {
    font-size: 0.72rem;
    color: var(--sage);
    letter-spacing: 0.06em;
  }

  .online-dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #6ee7a0;
    margin-right: 5px;
    vertical-align: middle;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.45; }
  }

  /* ── MESSAGES AREA ───────────────────────── */
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 1.4rem 1.1rem 0.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.9rem;
    scroll-behavior: smooth;
  }

  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-track { background: transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--warm); border-radius: 4px; }

  /* Bot bubble */
  .msg-bot {
    display: flex;
    align-items: flex-start;
    gap: 0.6rem;
    animation: slideIn 0.3s ease;
  }

  .msg-bot-icon {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--forest);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .msg-bot-bubble {
    background: white;
    border: 1px solid rgba(30,58,47,0.09);
    border-radius: 0 14px 14px 14px;
    padding: 0.75rem 1rem;
    font-size: 0.88rem;
    line-height: 1.55;
    color: var(--forest);
    max-width: calc(100% - 42px);
    box-shadow: 0 2px 8px var(--shadow);
    word-wrap: break-word;
  }

  .msg-bot-bubble b {
    font-weight: 500;
    color: var(--moss);
  }

  .msg-bot-bubble .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 0.95rem;
    color: var(--forest);
    display: block;
    margin-bottom: 0.5rem;
  }

  .msg-bot-bubble ul {
    padding-left: 1.1rem;
    margin: 0.4rem 0;
  }

  .msg-bot-bubble li {
    margin-bottom: 0.3rem;
    font-size: 0.85rem;
  }

  .msg-bot-bubble .place-card {
    background: var(--cream);
    border-radius: 8px;
    padding: 0.6rem 0.8rem;
    margin: 0.4rem 0;
    border-left: 3px solid var(--accent);
  }

  .msg-bot-bubble .place-card strong {
    display: block;
    font-size: 0.87rem;
    font-weight: 500;
    color: var(--forest);
    margin-bottom: 0.1rem;
  }

  .msg-bot-bubble .place-card small {
    font-size: 0.76rem;
    color: var(--stone);
    display: block;
  }

  .msg-bot-bubble .place-card a {
    color: var(--moss);
    text-decoration: none;
    font-weight: 500;
  }

  .msg-bot-bubble .place-card a:hover {
    text-decoration: underline;
  }

  /* User bubble */
  .msg-user {
    display: flex;
    justify-content: flex-end;
    animation: slideIn 0.2s ease;
  }

  .msg-user-bubble {
    background: var(--forest);
    color: white;
    border-radius: 14px 0 14px 14px;
    padding: 0.65rem 1rem;
    font-size: 0.87rem;
    max-width: 75%;
    line-height: 1.4;
    word-wrap: break-word;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Typing indicator */
  .typing {
    display: flex;
    align-items: flex-start;
    gap: 0.6rem;
    animation: slideIn 0.2s ease;
  }

  .typing-dots {
    background: white;
    border: 1px solid rgba(30,58,47,0.09);
    border-radius: 0 14px 14px 14px;
    padding: 0.7rem 1.1rem;
    display: flex;
    gap: 4px;
    align-items: center;
    box-shadow: 0 2px 8px var(--shadow);
  }

  .typing-dots span {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--sage);
    animation: bounce 1.3s ease-in-out infinite;
  }

  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  /* ── QUICK REPLIES / BUTTONS ─────────────── */
  .chat-buttons {
    padding: 0.8rem 1.1rem 0.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.55rem;
    flex-shrink: 0;
    border-top: 1px solid rgba(30,58,47,0.07);
    background: var(--snow);
    max-height: 40%;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .chat-buttons::-webkit-scrollbar { width: 4px; }
  .chat-buttons::-webkit-scrollbar-track { background: transparent; }
  .chat-buttons::-webkit-scrollbar-thumb { background: var(--warm); border-radius: 4px; }

  .chat-buttons-label {
    font-size: 0.72rem;
    color: var(--stone);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 0.1rem;
  }

  .quick-btn {
    background: white;
    border: 1.5px solid rgba(30,58,47,0.15);
    border-radius: 10px;
    padding: 0.7rem 1rem;
    font-family: 'Jost', sans-serif;
    font-size: 0.87rem;
    font-weight: 400;
    color: var(--forest);
    cursor: pointer;
    text-align: left;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    box-shadow: 0 1px 4px var(--shadow);
    flex-shrink: 0;
  }

  .quick-btn:hover {
    border-color: var(--moss);
    background: var(--cream);
    transform: translateY(-1px);
    box-shadow: 0 3px 10px var(--shadow);
  }

  .quick-btn:active { transform: translateY(0); }

  .quick-btn .btn-icon {
    font-size: 1.1rem;
    width: 24px;
    text-align: center;
    flex-shrink: 0;
  }

  /* Home button */
  .home-btn {
    background: none;
    border: none;
    color: var(--sage);
    font-family: 'Jost', sans-serif;
    font-size: 0.78rem;
    cursor: pointer;
    padding: 0.3rem 0;
    letter-spacing: 0.05em;
    text-decoration: underline;
    text-underline-offset: 3px;
    margin-top: 0.1rem;
    text-align: center;
    flex-shrink: 0;
  }

  .home-btn:hover { color: var(--accent); }

  /* ── INPUT BAR (free text per GPT) ───────── */
  .chat-input-bar {
    display: flex;
    align-items: flex-end;
    gap: 0.5rem;
    padding: 0.7rem 0.9rem 0.9rem;
    background: var(--snow);
    border-top: 1px solid rgba(30,58,47,0.07);
    flex-shrink: 0;
  }

  .chat-input {
    flex: 1;
    border: 1.5px solid rgba(30,58,47,0.15);
    border-radius: 18px;
    padding: 0.6rem 0.95rem;
    font-family: 'Jost', sans-serif;
    font-size: 0.88rem;
    color: var(--forest);
    background: white;
    resize: none;
    outline: none;
    min-height: 40px;
    max-height: 100px;
    line-height: 1.4;
    transition: border-color 0.2s ease;
  }

  .chat-input:focus { border-color: var(--moss); }

  .chat-send-btn {
    background: var(--forest);
    color: white;
    border: none;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    font-size: 1.1rem;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s ease, transform 0.15s ease;
  }

  .chat-send-btn:hover:not(:disabled) {
    background: var(--moss);
    transform: scale(1.05);
  }

  .chat-send-btn:disabled {
    background: var(--stone);
    cursor: not-allowed;
    opacity: 0.6;
  }

  /* ── RESPONSIVE ──────────────────────────── */
  @media (max-width: 480px) {
    body { padding: 0; }
    .chat-wrapper { border-radius: 0; }
  }
</style>
</head>

// ─── METEO (Open-Meteo, free) ─────────────────────────────────────────────────

const WMO_ICONS = {
  0:'☀️', 1:'🌤️', 2:'⛅', 3:'☁️',
  45:'🌫️', 48:'🌫️',
  51:'🌦️', 53:'🌦️', 55:'🌧️',
  61:'🌧️', 63:'🌧️', 65:'🌧️',
  71:'🌨️', 73:'🌨️', 75:'❄️',
  77:'❄️', 80:'🌦️', 81:'🌧️', 82:'⛈️',
  85:'🌨️', 86:'🌨️',
  95:'⛈️', 96:'⛈️', 99:'⛈️'
};

const WMO_DESC = {
  0:'Sereno', 1:'Prevalentemente sereno', 2:'Parzialmente nuvoloso', 3:'Coperto',
  45:'Nebbia', 48:'Nebbia con brina',
  51:'Pioggerella leggera', 53:'Pioggerella', 55:'Pioggerella intensa',
  61:'Pioggia leggera', 63:'Pioggia', 65:'Pioggia intensa',
  71:'Neve leggera', 73:'Neve', 75:'Neve intensa',
  77:'Granelli di neve', 80:'Rovesci leggeri', 81:'Rovesci', 82:'Rovesci forti',
  85:'Neve a rovesci', 86:'Neve intensa a rovesci',
  95:'Temporale', 96:'Temporale con grandine', 99:'Temporale con grandine forte'
};

const DAYS_IT = ['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];
const MONTHS_IT = ['gen','feb','mar','apr','mag','giu','lug','ago','set','ott','nov','dic'];

async function fetchMeteo() {
  const url = 'https://api.open-meteo.com/v1/forecast?latitude=46.40265&longitude=12.82263&elevation=716&current=temperature_2m,apparent_temperature,weathercode,windspeed_10m,relativehumidity_2m&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Europe%2FRome&forecast_days=5&wind_speed_unit=kmh';

  const controller = new AbortController();
  setTimeout(() => controller.abort(), 8000);

  const res = await fetch(url, { signal: controller.signal });
  const data = await res.json();
  const c = data.current;
  const d = data.daily;

  const icon = WMO_ICONS[c.weathercode] || '🌡️';
  const desc = WMO_DESC[c.weathercode]  || '';

  let forecastRows = '';
  for (let i = 1; i < 5; i++) {
    const date    = new Date(d.time[i]);
    const dayName = DAYS_IT[date.getDay()];
    const dayNum  = date.getDate();
    const mon     = MONTHS_IT[date.getMonth()];
    const ico     = WMO_ICONS[d.weathercode[i]] || '🌡️';
    const max     = Math.round(d.temperature_2m_max[i]);
    const min     = Math.round(d.temperature_2m_min[i]);
    const rain    = d.precipitation_probability_max[i];
    forecastRows += `
      <div class="place-card">
        <strong>${ico} ${dayName} ${dayNum} ${mon}</strong>
        <small>${WMO_DESC[d.weathercode[i]] || ''} · Max ${max}° Min ${min}° · 🌧️ ${rain}%</small>
      </div>`;
  }

  return `<span class="section-title">${icon} Meteo a Feltrone – ora</span>
<div class="place-card">
  <strong>${icon} ${Math.round(c.temperature_2m)}° — ${desc}</strong>
  <small>Percepita ${Math.round(c.apparent_temperature)}° · Umidità ${c.relativehumidity_2m}% · Vento ${Math.round(c.windspeed_10m)} km/h</small>
  <small>📍 Feltrone, Socchieve · 716 m s.l.m.</small>
</div>
<b>Prossimi 4 giorni</b>${forecastRows}
<small style="color:var(--stone);font-size:0.72rem">Fonte: Open-Meteo · aggiornato in tempo reale</small>`;
}

// ─── ENGINE ───────────────────────────────────────────────────────────────────

const messagesEl = document.getElementById('chat-messages');
const buttonsEl  = document.getElementById('chat-buttons');
const inputEl    = document.getElementById('chat-input');
const sendBtn    = document.getElementById('chat-send-btn');

function scrollBottom() {
  setTimeout(() => { messagesEl.scrollTop = messagesEl.scrollHeight; }, 50);
}

function addBotBubble(html) {
  const row = document.createElement('div');
  row.className = 'msg-bot';
  row.innerHTML = `
    <div class="msg-bot-icon">🏔️</div>
    <div class="msg-bot-bubble">${html}</div>
  `;
  messagesEl.appendChild(row);
  scrollBottom();
}

function addUserBubble(text) {
  const row = document.createElement('div');
  row.className = 'msg-user';
  // textContent per sicurezza anti-XSS sull'input dell'utente
  const bubble = document.createElement('div');
  bubble.className = 'msg-user-bubble';
  bubble.textContent = text;
  row.appendChild(bubble);
  messagesEl.appendChild(row);
  scrollBottom();
}

function showTyping() {
  const row = document.createElement('div');
  row.className = 'typing';
  row.id = 'typing-indicator';
  row.innerHTML = `
    <div class="msg-bot-icon">🏔️</div>
    <div class="typing-dots">
      <span></span><span></span><span></span>
    </div>
  `;
  messagesEl.appendChild(row);
  scrollBottom();
}

function hideTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

function renderButtons(keys) {
  buttonsEl.innerHTML = '';

  if (keys.includes('home') && keys.length === 1) {
    const btn = document.createElement('button');
    btn.className = 'home-btn';
    btn.textContent = '↩ Torna al menu principale';
    btn.onclick = () => handleClick('home');
    buttonsEl.appendChild(btn);
    return;
  }

  const mainKeys = keys.filter(k => k !== 'home');
  const hasHome  = keys.includes('home');

  if (mainKeys.length > 0) {
    const label = document.createElement('div');
    label.className = 'chat-buttons-label';
    label.textContent = 'Scegli un\'opzione';
    buttonsEl.appendChild(label);
  }

  mainKeys.forEach(key => {
    const cfg = BUTTON_CONFIG[key] || { label: key, icon: '' };
    const btn = document.createElement('button');
    btn.className = 'quick-btn';
    btn.innerHTML = `<span class="btn-icon">${cfg.icon}</span>${cfg.label}`;
    btn.onclick = () => handleClick(key);
    buttonsEl.appendChild(btn);
  });

  if (hasHome) {
    const btn = document.createElement('button');
    btn.className = 'home-btn';
    btn.textContent = '↩ Torna al menu principale';
    btn.onclick = () => handleClick('home');
    buttonsEl.appendChild(btn);
  }
}

async function handleClick(key) {
  const data = RESPONSES[key];
  if (!data) return;

  if (key !== 'home') {
    const label = BUTTON_CONFIG[key]?.label || key;
    addUserBubble(label);
  }

  buttonsEl.innerHTML = '';
  showTyping();

  // Dynamic meteo fetch
  if (data.dynamic === 'meteo') {
    try {
      const html = await fetchMeteo();
      hideTyping();
      addBotBubble(html);
    } catch (e) {
      hideTyping();
      addBotBubble('⚠️ Non riesco a recuperare le previsioni meteo in questo momento. Riprova tra poco!');
    }
    renderButtons(data.buttons);
    return;
  }

  setTimeout(() => {
    hideTyping();
    if (data.submenu) {
      addBotBubble(data.intro);
    } else if (data.message) {
      addBotBubble(data.message);
    }
    renderButtons(data.buttons);
  }, key === 'home' ? 300 : 800);
}

// ─── FREE INPUT (GPT via proxy) ───────────────────────────────────────────────

async function sendFreeMessage() {
  const text = inputEl.value.trim();
  if (!text) return;

  addUserBubble(text);
  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;
  buttonsEl.innerHTML = '';
  showTyping();

  try {
    const controller = new AbortController();
    setTimeout(() => controller.abort(), 20000);

    const res = await fetch(PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
      signal: controller.signal
    });

    const data = await res.json();
    hideTyping();

    if (res.ok && data.reply) {
      // Anti-XSS: convertiamo i \n in <br> ma rendiamo testo il resto
      const safeReply = data.reply
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\n/g, '<br>');
      addBotBubble(safeReply);
    } else if (res.status === 429) {
      addBotBubble('⚠️ ' + (data.error || 'Troppe richieste, riprova tra poco.'));
    } else {
      addBotBubble('⚠️ ' + (data.error || 'Mi dispiace, non riesco a rispondere ora. Contatta Dario al <a href="tel:+393299451083">329 945 1083</a>.'));
    }
  } catch (e) {
    hideTyping();
    addBotBubble('⚠️ Connessione non disponibile. Contatta Dario al <a href="tel:+393299451083">329 945 1083</a>.');
  }

  sendBtn.disabled = false;
  renderButtons(['home']);
}

sendBtn.addEventListener('click', sendFreeMessage);

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendFreeMessage();
  }
});

inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
});

// ─── INIT ─────────────────────────────────────────────────────────────────────

function init() {
  const data = RESPONSES.home;
  addBotBubble(data.message);
  renderButtons(data.buttons);
}

init();
</script>
